schema: conduction

context: |
  Project: OpenConnector
  Repo: ConductionNL/openconnector
  Type: Nextcloud App (PHP backend + Vue 2 frontend)
  Description: API integration and data synchronization platform for Nextcloud
  Mount path: /var/www/html/custom_apps/openconnector

  Shared specs: See ../openspec/specs/ for cross-project conventions
  Project guidelines: See ../project.md for workspace-wide standards

rules:
  proposal:
    - Reference shared nextcloud-app spec for app structure requirements
    - "ADR-011: Check OpenRegister core for existing functionality before proposing new features"
  specs:
    - "ADR-009: Include test scenarios for all MUST/SHALL requirements"
  design:
    - "ADR-001: All data MUST be stored via OpenRegister — no custom database tables"
    - "ADR-012: MUST use @conduction/nextcloud-vue components (CnIndexPage, CnDashboardPage, CnFormDialog, CnDataTable) — do NOT create custom equivalents"
    - "ADR-008: Follow Controller → Service → Mapper layering pattern"
    - "ADR-003: MUST use NL Design System tokens via Nextcloud CSS variables — no hardcoded colors"
  tasks:
    - "ADR-010: MUST include documentation task with browser screenshots using Playwright MCP"
    - "ADR-009: MUST include unit test tasks — minimum 75% coverage for new code"
    - "ADR-005: MUST include i18n tasks — Dutch and English translations required"
    - "ADR-010: Every user-facing feature MUST have docs in docs/features/ with screenshots"
