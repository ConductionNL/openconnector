name: Sync Development to Development-Release

permissions:
  contents: write

on:
  push:
    branches:
      # - development
      - never

jobs:
  sync-to-development-release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository with full history
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      # Step 2: Configure Git to use SSH for authentication
      - name: Configure Git SSH
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote set-url origin git@github.com:${{ github.repository }}.git

      # Step 3: Sync development to development-release while preserving the unstable version
      - name: Update development-release branch
        run: |
          # Fetch all branches from remote
          git fetch origin
          
          # Get the commit message that triggered this workflow
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          # Store the current development-release version if the branch exists
          # This version will be restored after syncing to maintain version continuity
          DEV_RELEASE_VERSION=""
          if git show-ref --quiet refs/remotes/origin/development-release; then
            git checkout origin/development-release
            DEV_RELEASE_VERSION=$(grep -oP '(?<=<version>)[^<]+' appinfo/info.xml || echo "")
            echo "Found existing development-release version: $DEV_RELEASE_VERSION"
          fi
          
          # Check if development-release branch exists
          if git show-ref --quiet refs/remotes/origin/development-release; then
            # Branch exists: checkout and reset to latest development state
            git checkout development-release
            git reset --hard origin/development  # Sync all changes from development
          else
            # Branch doesn't exist: create new branch from development
            git checkout -b development-release origin/development
          fi
          
          # Restore the development-release version if it existed
          # This ensures version increments are preserved across syncs
          if [ ! -z "$DEV_RELEASE_VERSION" ]; then
            sed -i "s|<version>.*</version>|<version>${DEV_RELEASE_VERSION}</version>|" appinfo/info.xml
            git add appinfo/info.xml
            git commit -m "${COMMIT_MSG}
            
            Restored development-release version to ${DEV_RELEASE_VERSION}"
          fi
          
          # Push to development-release branch using SSH with force
          # Force push is safe here because we control this branch
          git push -f origin development-release
