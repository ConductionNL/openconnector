name: Sync Beta to Beta-Release

permissions:
  contents: write
  actions: write

on:
  push:
    branches:
      # - beta
      - never

jobs:
  sync-to-beta-release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository with full history
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      # Step 2: Configure Git to use SSH for authentication
      - name: Configure Git SSH
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote set-url origin git@github.com:${{ github.repository }}.git

      # Step 3: Sync beta to beta-release while preserving the beta version
      - name: Update beta-release branch
        run: |
          # Fetch all branches from remote
          git fetch origin
          
          # Get the commit message that triggered this workflow
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          # Store the current beta-release version if the branch exists
          # This version will be restored after syncing to maintain version continuity
          BETA_RELEASE_VERSION=""
          if git show-ref --quiet refs/remotes/origin/beta-release; then
            git checkout origin/beta-release
            BETA_RELEASE_VERSION=$(grep -oP '(?<=<version>)[^<]+' appinfo/info.xml || echo "")
            echo "Found existing beta-release version: $BETA_RELEASE_VERSION"
          fi
          
          # Check if beta-release branch exists
          if git show-ref --quiet refs/remotes/origin/beta-release; then
            # Branch exists: checkout and reset to latest beta state
            git checkout beta-release
            git reset --hard origin/beta  # Sync all changes from beta
          else
            # Branch doesn't exist: create new branch from beta
            git checkout -b beta-release origin/beta
          fi
          
          # Restore the beta-release version if it existed
          # This ensures version increments are preserved across syncs
          if [ ! -z "$BETA_RELEASE_VERSION" ]; then
            sed -i "s|<version>.*</version>|<version>${BETA_RELEASE_VERSION}</version>|" appinfo/info.xml
            git add appinfo/info.xml
            git commit -m "${COMMIT_MSG}
            
            Restored beta-release version to ${BETA_RELEASE_VERSION}"
          fi
          
          # Push to beta-release branch using SSH with force
          # Force push is safe here because we control this branch
          git push -f origin beta-release
